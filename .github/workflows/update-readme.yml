name: Update README

on:
  push:
    branches: [main]
    paths:
      - 'website/data/subdomains.json'
      - '.github/scripts/generate-readme.js'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-readme
  cancel-in-progress: true

jobs:
  update-readme:
    name: Regenerate README
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generate README from subdomains.json
        run: node .github/scripts/generate-readme.js

      - name: Commit and push if README changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --cached --quiet; then
            echo "README.md is already up to date — nothing to commit."
          else
            git commit -m "chore: auto-update README from subdomains.json"
            git push
          fi